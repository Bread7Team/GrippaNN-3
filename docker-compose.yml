services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hrm_db
      - POSTGRES_USER=hrm_user
      - POSTGRES_PASSWORD=hrm_pass
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://hrm_user:hrm_pass@db:5432/hrm_db
      - DEBUG=True
    depends_on:
      - db

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
